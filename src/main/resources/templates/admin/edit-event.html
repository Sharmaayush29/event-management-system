<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Edit Event — EventFlow</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="app-wrapper">

<div th:replace="~{fragments :: navbar}"></div>

<main class="main-content">

    <div class="page-header">
        <div>
            <h1 class="page-title">✏️ Edit Event</h1>
            <p class="page-subtitle">Update event details</p>
        </div>
        <a th:href="@{/admin/dashboard}" class="btn btn-outline">← Back to Dashboard</a>
    </div>

    <div th:replace="~{fragments :: alerts}"></div>

    <div style="max-width: 800px;">
        <div class="card">
            <form th:action="@{/admin/events/{id}/edit(id=${event.id})}" method="post">

                <div class="form-group">
                    <label class="form-label" for="title">🎪 Event Title *</label>
                    <input type="text" id="title" name="title" class="form-control"
                           th:value="${event.title}" required maxlength="200"/>
                </div>

                <div class="form-group">
                    <label class="form-label" for="category">📂 Category *</label>
                    <select id="category" name="category" class="form-control" required>
                        <option value="Workshop" th:selected="${event.category == 'Workshop'}">Workshop</option>
                        <option value="Conference" th:selected="${event.category == 'Conference'}">Conference</option>
                        <option value="Seminar" th:selected="${event.category == 'Seminar'}">Seminar</option>
                        <option value="Networking" th:selected="${event.category == 'Networking'}">Networking</option>
                        <option value="Hackathon" th:selected="${event.category == 'Hackathon'}">Hackathon</option>
                        <option value="Other" th:selected="${event.category == 'Other'}">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="description">📝 Short Description</label>
                    <textarea id="description" name="description" class="form-control" rows="2"
                              th:text="${event.description}"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="agenda">📋 Detailed Agenda</label>
                    <textarea id="agenda" name="agenda" class="form-control" rows="6"
                              th:text="${event.agenda}"></textarea>
                </div>

                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem;">
                    <div class="form-group">
                        <label class="form-label" for="date">📆 Event Date *</label>
                        <input type="date" id="date" name="date" class="form-control"
                               th:value="${#temporals.format(event.date, 'yyyy-MM-dd')}" required/>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="location">📍 Location *</label>
                        <input type="text" id="location" name="location" class="form-control"
                               th:value="${event.location}" required maxlength="200"/>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="maxCapacity">👥 Max Capacity *</label>
                        <input type="number" id="maxCapacity" name="maxCapacity" class="form-control"
                               th:value="${event.maxCapacity}" min="1" required/>
                    </div>
                </div>

                <div style="display:flex; gap:1rem; margin-top:1.25rem;">
                    <button type="submit" class="btn btn-warning btn-lg">💾 Save Changes</button>
                    <a th:href="@{/admin/dashboard}" class="btn btn-outline btn-lg">Cancel</a>
                </div>
            </form>
        </div>
    </div>

</main>

<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
