<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>EventFlow</title>
</head>
<body>

<!-- ======================== NAVBAR FRAGMENT ======================== -->
<nav class="navbar glass" th:fragment="navbar">
    
    <!-- Brand -->
    <a class="navbar-brand" th:href="@{/dashboard}">
        🎪 <span class="brand-font">EventFlow</span>
    </a>

    <!-- Nav Links -->
    <ul class="navbar-nav" style="display:flex; list-style:none; gap:0.5rem; align-items:center;">
        <li sec:authorize="hasRole('USER')">
            <a class="nav-link" th:href="@{/user/dashboard}">Dashboard</a>
        </li>
        <li sec:authorize="hasAnyRole('USER','ADMIN')">
            <a class="nav-link" th:href="@{/events/upcoming}">Upcoming</a>
        </li>
        <li sec:authorize="hasAnyRole('USER','ADMIN')">
            <a class="nav-link" th:href="@{/events/past}">Galleries</a>
        </li>

        <li sec:authorize="hasRole('ADMIN')" style="margin-left:1rem; padding-left:1rem; border-left:1px solid var(--border-color);">
            <a class="nav-link" th:href="@{/admin/dashboard}" style="color:var(--accent);">Admin Console</a>
        </li>
    </ul>

    <!-- User Section -->
    <div style="display:flex; align-items:center; gap:1.25rem;" sec:authorize="isAuthenticated()">
        <div style="display:flex; align-items:center; gap:0.75rem; padding:0.4rem 1rem; background:rgba(255,255,255,0.05); border-radius:99px;">
            <div class="user-avatar" style="width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg, var(--primary), var(--accent)); display:flex; align-items:center; justify-content:center; font-size:0.75rem; font-weight:700;">
                <span sec:authentication="name" th:text="${#strings.substring(#authentication.name, 0, 1).toUpperCase()}">U</span>
            </div>
            <span style="font-size:0.85rem; font-weight:600;" sec:authentication="name"></span>
        </div>
        
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-outline btn-sm" style="border-radius:99px; padding:0.4rem 1.2rem;">Logout</button>
        </form>
    </div>

</nav>

<!-- ======================== FOOTER FRAGMENT ======================== -->
<footer th:fragment="footer" style="margin-top:4rem; padding:3rem 2rem; border-top:1px solid var(--border-color); text-align:center;">
    <p style="color:var(--text-muted); font-size:0.85rem; font-weight:500;">
        © 2025 <span style="color:var(--text-primary); font-weight:700;">EventFlow</span> — Professional Event Management. 
        <br/>
        <span style="opacity:0.6;">Crafted with Spring Boot &amp; Digital Excellence.</span>
    </p>
</footer>

<!-- ======================== ALERTS FRAGMENT ======================== -->
<div th:fragment="alerts" style="margin-bottom:1.5rem;">
    <div th:if="${successMsg}" class="alert alert-success glass">
        <span style="font-size:1.2rem;">✨</span>
        <span th:text="${successMsg}"></span>
    </div>
    <div th:if="${errorMsg}" class="alert alert-error glass">
        <span style="font-size:1.2rem;">⚠️</span>
        <span th:text="${errorMsg}"></span>
    </div>
</div>

</body>
</html>
