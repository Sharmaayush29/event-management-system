<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>EventFlow</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- ======================== NAVBAR FRAGMENT ======================== -->
<nav class="navbar" th:fragment="navbar">
    <div class="navbar-inner">

        <!-- Brand -->
        <a class="navbar-brand" th:href="@{/dashboard}">
            <span class="brand-icon">🎪</span> EventFlow
        </a>

        <!-- Nav Links -->
        <ul class="navbar-nav">
            <!-- USER NAV -->
            <li sec:authorize="hasRole('USER')">
                <a class="nav-link" th:href="@{/user/dashboard}">🏠 Dashboard</a>
            </li>
            <li sec:authorize="hasAnyRole('USER','ADMIN')">
                <a class="nav-link" th:href="@{/events/upcoming}">📅 Upcoming Events</a>
            </li>
            <li sec:authorize="hasAnyRole('USER','ADMIN')">
                <a class="nav-link" th:href="@{/events/past}">🖼️ Past Events</a>
            </li>

            <!-- ADMIN NAV -->
            <li sec:authorize="hasRole('ADMIN')">
                <a class="nav-link" th:href="@{/admin/dashboard}">⚙️ Admin</a>
            </li>
            <li sec:authorize="hasRole('ADMIN')">
                <a class="nav-link" th:href="@{/admin/events/create}">➕ New Event</a>
            </li>
            <li sec:authorize="hasRole('ADMIN')">
                <a class="nav-link" th:href="@{/admin/users}">👥 Users</a>
            </li>
        </ul>

        <!-- User info + logout -->
        <div class="flex gap-2" sec:authorize="isAuthenticated()">
            <div class="navbar-user">
                <div class="user-avatar">
                    <span sec:authentication="name"
                          th:text="${#strings.substring(#authentication.name, 0, 1).toUpperCase()}">U</span>
                </div>
                <span class="user-name" sec:authentication="name"></span>
                <span class="badge-role admin" sec:authorize="hasRole('ADMIN')">Admin</span>
                <span class="badge-role user"  sec:authorize="hasRole('USER')">User</span>
            </div>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-outline btn-sm">🚪 Logout</button>
            </form>
        </div>

    </div>
</nav>

<!-- ======================== FOOTER FRAGMENT ======================== -->
<footer th:fragment="footer">
    <p>© 2025 EventFlow — Online Event Management System. Built with Spring Boot &amp; ❤️</p>
</footer>

<!-- ======================== ALERTS FRAGMENT ======================== -->
<div th:fragment="alerts">
    <div th:if="${successMsg}" class="alert alert-success">
        ✅ <span th:text="${successMsg}"></span>
    </div>
    <div th:if="${errorMsg}" class="alert alert-error">
        ❌ <span th:text="${errorMsg}"></span>
    </div>
    <div th:if="${infoMsg}" class="alert alert-info">
        ℹ️ <span th:text="${infoMsg}"></span>
    </div>
</div>

</body>
</html>
