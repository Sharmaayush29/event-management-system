<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Gateway — EventFlow</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-wrapper animate-in" style="display:flex; align-items:center; justify-content:center; padding:2rem;">

    <div class="card glass auth-card" style="width:100%; max-width:440px; padding:3.5rem 3rem;">
        
        <!-- Header -->
        <div style="text-align:center; margin-bottom:2.5rem;">
            <div style="font-size:3rem; margin-bottom:1rem; display:inline-block; filter: drop-shadow(var(--shadow-glow));">🎪</div>
            <h1 class="brand-font" style="font-size:2.2rem; margin-bottom:0.5rem; background:linear-gradient(135deg, white, var(--primary-light)); -webkit-background-clip:text; color:transparent;">Portal Access</h1>
            <p style="color:var(--text-secondary); font-size:0.9rem;">Sign in to orchestrate your experiences.</p>
        </div>

        <!-- Alerts -->
        <div th:if="${errorMsg}" class="alert alert-error glass" style="margin-bottom:1.5rem; font-size:0.85rem; padding:0.75rem 1rem;">
            <span>⚠️</span> <span th:text="${errorMsg}"></span>
        </div>
        <div th:if="${logoutMsg}" class="alert alert-success glass" style="margin-bottom:1.5rem; font-size:0.85rem; padding:0.75rem 1rem;">
            <span>✨</span> <span th:text="${logoutMsg}"></span>
        </div>

        <!-- Form -->
        <form th:action="@{/login}" method="post" style="display:flex; flex-direction:column; gap:1.5rem;">
            <div>
                <label style="display:block; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-muted); margin-bottom:0.6rem; font-weight:700;">Identity</label>
                <input type="email" name="email" class="form-control" placeholder="address@domain.com" required autofocus/>
            </div>

            <div>
                <label style="display:block; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-muted); margin-bottom:0.6rem; font-weight:700;">Secret Key</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
            </div>

            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:1.1rem; border-radius:99px; font-weight:800; text-transform:uppercase; letter-spacing:0.1em; margin-top:1rem;">
                Authenticate
            </button>
        </form>

        <!-- Footer -->
        <div style="margin-top:2.5rem; text-align:center; padding-top:2rem; border-top:1px solid var(--border-color);">
            <p style="color:var(--text-muted); font-size:0.88rem;">
                New to the platform? 
                <a th:href="@{/register}" style="color:var(--primary); font-weight:700; margin-left:0.5rem;">Initialize Account</a>
            </p>
        </div>

    </div>

</body>
</html>
