<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — EventFlow</title>
    <meta name="description" content="Sign in to EventFlow to manage and join events."/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="auth-page">
    <div class="auth-card">

        <!-- Logo -->
        <div class="auth-logo">
            <span class="logo-icon">🎪</span>
            <h1>EventFlow</h1>
            <p>Online Event Management System</p>
        </div>

        <!-- Alerts -->
        <div th:if="${errorMsg}" class="alert alert-error">
            ❌ <span th:text="${errorMsg}"></span>
        </div>
        <div th:if="${logoutMsg}" class="alert alert-success">
            ✅ <span th:text="${logoutMsg}"></span>
        </div>
        <div th:if="${successMsg}" class="alert alert-success">
            ✅ <span th:text="${successMsg}"></span>
        </div>

        <!-- Login Form -->
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label class="form-label" for="email">📧 Email Address</label>
                <input type="email" id="email" name="email" class="form-control"
                       placeholder="your@email.com" required autofocus/>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">🔒 Password</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="Enter your password" required/>
            </div>

            <button type="submit" id="login-btn" class="btn btn-primary btn-block btn-lg" style="margin-top:0.5rem;">
                🚀 Sign In
            </button>
        </form>

        <div class="auth-divider">or</div>

        <!-- Register Link -->
        <div class="text-center">
            <p style="color: var(--text-secondary); font-size: 0.88rem;">
                Don't have an account?
                <a th:href="@{/register}" style="color: var(--primary); font-weight:600;">Create Account →</a>
            </p>
        </div>


    </div>
</div>
</body>
</html>
