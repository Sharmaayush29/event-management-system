<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register — EventFlow</title>
    <meta name="description" content="Create your free EventFlow account to join and manage events."/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="auth-page">
    <div class="auth-card">

        <!-- Logo -->
        <div class="auth-logo">
            <span class="logo-icon">🎪</span>
            <h1>Create Account</h1>
            <p>Join EventFlow today — it's free!</p>
        </div>

        <!-- Alerts -->
        <div th:if="${errorMsg}" class="alert alert-error">
            ❌ <span th:text="${errorMsg}"></span>
        </div>

        <!-- Register Form -->
        <form th:action="@{/register}" method="post" id="register-form">
            <div class="form-group">
                <label class="form-label" for="name">👤 Full Name</label>
                <input type="text" id="name" name="name" class="form-control"
                       placeholder="Your full name" required/>
            </div>

            <div class="form-group">
                <label class="form-label" for="rollNo">🎓 Roll Number</label>
                <input type="text" id="rollNo" name="rollNo" class="form-control"
                       placeholder="e.g. 22CS101" style="text-transform:uppercase;"/>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">📧 Email Address</label>
                <input type="email" id="email" name="email" class="form-control"
                       placeholder="your@email.com" required/>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">🔒 Password</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="Min 6 characters" minlength="6" required/>
            </div>

            <div class="form-group">
                <label class="form-label" for="confirmPassword">🔒 Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" class="form-control"
                       placeholder="Repeat your password" required/>
            </div>

            <button type="submit" id="register-btn" class="btn btn-primary btn-block btn-lg" style="margin-top:0.5rem;">
                ✨ Create Account
            </button>
        </form>

        <div class="auth-divider">or</div>

        <div class="text-center">
            <p style="color: var(--text-secondary); font-size: 0.88rem;">
                Already have an account?
                <a th:href="@{/login}" style="color: var(--primary); font-weight:600;">Sign In →</a>
            </p>
        </div>

    </div>
</div>
</body>
</html>
