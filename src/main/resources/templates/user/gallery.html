<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${event.title} + ' — Gallery'">Event Gallery — EventFlow</title>
    <meta name="description" content="Photo gallery for the event."/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        .lightbox-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .lightbox-overlay.open {
            display: flex;
        }
        .lightbox-overlay img {
            max-width: 90vw;
            max-height: 85vh;
            border-radius: 12px;
            box-shadow: 0 0 60px rgba(0,0,0,0.8);
        }
        .lightbox-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            font-size: 1.5rem;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .lightbox-close:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body class="app-wrapper">

<div th:replace="~{fragments :: navbar}"></div>

<!-- Lightbox -->
<div class="lightbox-overlay" id="lightbox" onclick="closeLightbox(event)">
    <button class="lightbox-close" onclick="document.getElementById('lightbox').classList.remove('open')">✕</button>
    <img id="lightbox-img" src="" alt="Photo"/>
</div>

<main class="main-content">

    <div class="page-header">
        <div>
            <h1 class="page-title">🖼️ <span th:text="${event.title}">Event</span> — Gallery</h1>
            <div class="event-meta" style="margin-top:0.5rem;">
                <div class="event-meta-item">
                    <span class="icon">📆</span>
                    <span th:text="${#temporals.format(event.date, 'dd MMMM yyyy')}">Date</span>
                </div>
                <div class="event-meta-item">
                    <span class="icon">📷</span>
                    <span th:text="${photos.size()} + ' photos'">0 photos</span>
                </div>
            </div>
        </div>
        <a th:href="@{/events/past}" class="btn btn-outline">← Back to Past Events</a>
    </div>

    <!-- Empty State -->
    <div th:if="${photos.isEmpty()}" class="empty-state">
        <div class="empty-state-icon">📷</div>
        <h3>No Photos Yet</h3>
        <p>The admin hasn't uploaded photos for this event yet.</p>
    </div>

    <!-- Photo Grid -->
    <div th:unless="${photos.isEmpty()}" class="photo-grid" style="grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));">
        <div th:each="photo : ${photos}"
             class="photo-item"
             th:data-path="${photo.filePath}"
             onclick="openLightbox(this.getAttribute('data-path'))"
             style="cursor:pointer;">
            <img th:src="@{${photo.filePath}}" th:alt="${photo.fileName}" loading="lazy"/>
            <div class="photo-overlay">
                <span style="color:white; font-size:1.5rem;">🔍</span>
                <span style="color:rgba(255,255,255,0.7); font-size:0.78rem; margin-top:0.25rem;">Click to enlarge</span>
            </div>
        </div>
    </div>

</main>

<div th:replace="~{fragments :: footer}"></div>

<script>
function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('open');
}

function closeLightbox(event) {
    if (event.target === document.getElementById('lightbox')) {
        document.getElementById('lightbox').classList.remove('open');
    }
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('open');
});
</script>
</body>
</html>
